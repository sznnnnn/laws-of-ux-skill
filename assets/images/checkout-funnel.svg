<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="34" fill="#0f172a">Checkout Funnel (Illustrative)</text>

  <rect x="120" y="170" width="900" height="60" rx="12" fill="#0ea5e9"/>
  <text x="150" y="208" font-family="Arial, sans-serif" font-size="24" fill="#fff">Cart -> 100%</text>

  <rect x="120" y="265" width="760" height="60" rx="12" fill="#38bdf8"/>
  <text x="150" y="303" font-family="Arial, sans-serif" font-size="24" fill="#fff">Address -> 84%</text>

  <rect x="120" y="360" width="560" height="60" rx="12" fill="#7dd3fc"/>
  <text x="150" y="398" font-family="Arial, sans-serif" font-size="24" fill="#0c4a6e">Shipping -> 62% (largest drop)</text>

  <rect x="120" y="455" width="500" height="60" rx="12" fill="#bae6fd"/>
  <text x="150" y="493" font-family="Arial, sans-serif" font-size="24" fill="#0c4a6e">Payment -> 55%</text>

  <text x="120" y="585" font-family="Arial, sans-serif" font-size="22" fill="#334155">Use as supporting evidence for Hick's Law and Fitts's Law recommendations.</text>
</svg>
